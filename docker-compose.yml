networks:
  crypto-net:
    driver: bridge

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"   # accès inter-containers Docker
      - "9093:9093"   # accès depuis ton Mac (local dev)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - crypto-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - crypto-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - crypto-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto-net

  # ─── Producers (Ingestion) ─────────────────────────────────────────────────

  producer-binance:
    build: ./producer-binance
    container_name: producer-binance
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=crypto.trades.raw
      - SYMBOL=btcusdt
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - crypto-net

  producer-coinbase:
    build: ./producer-coinbase
    container_name: producer-coinbase
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=crypto.trades.raw
      - PRODUCT_ID=BTC-USD
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - crypto-net

  # ─── Stream Processor ──────────────────────────────────────────────────────

  stream-processor:
    build: ./stream-processor
    container_name: stream-processor
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=crypto.trades.raw
      - KAFKA_GROUP_ID=crypto-processor
      - MONGO_URI=mongodb://mongodb:27017/crypto
      - REDIS_URI=redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - crypto-net

  # ─── Health Dashboard ─────────────────────────────────────────────────────

  health-dashboard:
    build: ./health-dashboard
    container_name: health-dashboard
    ports:
      - "8888:8888"
    environment:
      - REDIS_URI=redis://redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - crypto-net

  # ─── API Server + Dashboard ────────────────────────────────────────────────

  api-server:
    build: ./api-server
    container_name: api-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/crypto
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure
    networks:
      - crypto-net

volumes:
  mongo_data:
